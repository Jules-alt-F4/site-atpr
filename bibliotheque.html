<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque — ATPR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="nav.js"></script>
</head>
<body class="bg-[#f5f2e8]">

    <main class="pt-32 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="font-heritage text-5xl text-[#052e16] italic">La Bibliothèque</h1>
            <p class="mt-4 text-[#c5a059] uppercase tracking-widest text-xs">Archives & Ressources</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

   <script>
    const supabaseUrl = 'https://zcueonuffhzrvnktxzpl.supabase.co';
    const supabaseKey = 'sb_publishable_yeSb-vYs5ibken1ypPAliQ_L07lvC9a';

    // En utilisant window.supabase, on rend l'objet accessible à TOUS les autres fichiers JS
    window.supabase = supabase.createClient(supabaseUrl, supabaseKey);


    </script>

    <script src="nav.js"></script>

    <script>
document.addEventListener('DOMContentLoaded', async () => {

    // Charger la navbar
    if (typeof loadNavbar === 'function') {
        loadNavbar();
    }

    // Vérification session
    const { data: { session }, error } = await supabase.auth.getSession();

    if (error || !session) {

        // Affiche immédiatement le popup connexion
        setTimeout(() => {
            toggleModal('modal-library-error');
        }, 150);

        // Floute et verrouille la bibliothèque
        document.body.classList.add('modal-open');

        // Empêche interaction avec le contenu
        const mainContent = document.querySelector('main');

        if (mainContent) {
            mainContent.style.filter = 'blur(4px)';
            mainContent.style.pointerEvents = 'none';
            mainContent.style.userSelect = 'none';
            mainContent.style.opacity = '0.6';
        }

    } else {

        // Session OK
        document.body.style.opacity = '1';
    }
});

    </script>

</body>
</html>

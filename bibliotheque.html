<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque — ATPR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="nav.js"></script>
</head>
<body class="bg-[#f5f2e8]">

    <main class="pt-32 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="font-heritage text-5xl text-[#052e16] italic">La Bibliothèque</h1>
            <p class="mt-4 text-[#c5a059] uppercase tracking-widest text-xs">Archives & Ressources</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

   <script>
    const supabaseUrl = 'https://zcueonuffhzrvnktxzpl.supabase.co';
    const supabaseKey = 'sb_publishable_yeSb-vYs5ibken1ypPAliQ_L07lvC9a';

    // En utilisant window.supabase, on rend l'objet accessible à TOUS les autres fichiers JS
    window.supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 3. Sécurité : Vérifier l'accès immédiatement
        async function checkAccess() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                // Si pas connecté, retour à l'accueil
                window.location.href = 'index.html';
            }
        }
        checkAccess();
    </script>

    <script src="nav.js"></script>

    <script>
        async function checkSecurity() {
            // 1. On attend que Supabase soit disponible (si chargé via CDN)
            if (typeof supabase === 'undefined') return;

            const { data: { session } } = await supabase.auth.getSession();

            if (!session) {
                // 2. Si pas de session, on stocke une info pour dire à l'index d'afficher l'erreur
                sessionStorage.setItem('showLibraryError', 'true');
                // 3. Redirection immédiate vers l'accueil
                window.location.href = 'index.html';
            }
        }

        // On lance la vérification dès que possible
        // Note : assure-toi que l'init de Supabase est fait avant cet appel
    </script>

    <script>
        // On attend que le DOM et Supabase soient chargés
document.addEventListener('DOMContentLoaded', async () => {
    // 1. Charger la navigation
    if (typeof loadNavbar === 'function') loadNavbar();

    // 2. Vérifier la session immédiatement
    const { data: { session }, error } = await supabase.auth.getSession();

    if (error || !session) {
        // Redirection vers l'accueil avec signal d'erreur
        sessionStorage.setItem('showLibraryError', 'true');
        window.location.href = 'index.html';
    } else {
        // Optionnel : Afficher le contenu une fois la session confirmée
        document.body.style.opacity = "1";
    }
});
    </script>
</body>
</html>

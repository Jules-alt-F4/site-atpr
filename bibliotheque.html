<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque — ATPR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- 1. Supabase EN PREMIER -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://zcueonuffhzrvnktxzpl.supabase.co';
        const supabaseKey = 'sb_publishable_yeSb-vYs5ibken1ypPAliQ_L07lvC9a';
        window.supabase = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <!-- 2. auth.js puis nav.js -->
    <script src="auth.js"></script>
    <script src="nav.js"></script>
</head>
<body class="bg-[#f5f2e8]">

    <main class="pt-32 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="font-heritage text-5xl text-[#052e16] italic">La Bibliothèque</h1>
            <p class="mt-4 text-[#c5a059] uppercase tracking-widest text-xs">Archives & Ressources</p>
        </div>
    </main>

    <!-- 3. Vérification session via onAuthStateChange — attend la vraie restauration depuis localStorage -->
    <script>
    let sessionChecked = false;

    supabase.auth.onAuthStateChange((event, session) => {

        // Ne s'exécute qu'une fois au chargement initial
        if (sessionChecked) return;
        sessionChecked = true;

        if (!session) {
            // Pas connecté : flouter + afficher popup
            const mainContent = document.querySelector('main');
            if (mainContent) {
                mainContent.style.filter = 'blur(4px)';
                mainContent.style.pointerEvents = 'none';
                mainContent.style.userSelect = 'none';
                mainContent.style.opacity = '0.6';
            }

            // Attendre que loadNavbar ait injecté les modales
            setTimeout(() => {
                toggleModal('modal-library-error');
                document.body.classList.add('modal-open');
            }, 100);

        }
        // Si session OK : rien à faire, nav.js gère déjà updateUI()
    });
    </script>

</body>
</html>

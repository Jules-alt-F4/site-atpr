<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE Santé Publique — Sujets — ATPr</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/supabase-init.js"></script>
</head>
<body class="bg-[#f5f2e8] min-h-screen bibliotheque-background">
    <main style="position:relative;z-index:1;" class="pt-32 px-6 pb-20">
        <div class="max-w-5xl mx-auto">
            <button onclick="history.back()" class="inline-flex items-center gap-2 text-[#052e16] hover:text-[#c5a059] transition text-sm mb-10">
                <i class="fa-solid fa-arrow-left text-xs"></i>
                <span class="uppercase tracking-wider text-xs">Retour</span>
            </button>
            <div class="text-center mb-16">
                <p class="text-[#c5a059] uppercase tracking-wider text-xs">P4 — Semestre 2 — Sujets</p>
                <h1 class="font-heritage text-5xl text-[#052e16] italic mt-4">UE Santé Publique</h1>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="border border-[#c5a059]/40 bg-white/50 backdrop-blur-sm rounded-2xl p-8 shadow-lg">
                    <p class="text-[#c5a059] uppercase tracking-wider text-xs mb-3">UE Santé Publique</p>
                    <h2 class="text-xl text-[#052e16] font-semibold italic mb-6">Module à renseigner</h2>
                    <div id="conf-module-a-renseigner" class="space-y-3">
                        <p class="text-sm text-[#5b4b2a] opacity-60 italic">Chargement...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/nav.js"></script>
    <script src="/auth.js"></script>
    <script>
    async function fetchConfs(annee, semestre, ue, module, type, containerId) {
        const el = document.getElementById(containerId);
        if (!el) return;
        const { data, error } = await window.supabase
            .from('conferences_classees').select('*')
            .eq('annee', annee).eq('semestre', semestre)
            .eq('ue', ue).eq('module', module).eq('type', type)
            .order('created_at', { ascending: false });
        if (error || !data || data.length === 0) {
            el.innerHTML = '<p class="text-sm text-[#5b4b2a] opacity-50 italic">Aucune conférence disponible pour le moment.</p>';
            return;
        }
        el.innerHTML = data.map(f => `
            <a href="${f.url}" target="_blank" class="flex items-center justify-between gap-4 border border-[#c5a059]/30 bg-white/60 rounded-xl px-5 py-3 hover:bg-[#f8f4ea] hover:border-[#c5a059] transition group">
                <div class="flex items-center gap-3">
                    <i class="fa-regular fa-file-pdf text-[#c5a059] text-lg"></i>
                    <span class="text-sm text-[#052e16] font-medium">${f.nom}</span>
                </div>
                <i class="fa-solid fa-download text-[#c5a059]/50 group-hover:text-[#c5a059] text-xs transition"></i>
            </a>`).join('');
    }
    document.addEventListener('DOMContentLoaded', async () => {
        const w = () => new Promise(r => { const c = () => window.supabase ? r() : setTimeout(c, 50); c(); });
        await w();
        fetchConfs('p4', '2', 'ue-sante-publique', 'Module à renseigner', 'sujets', 'conf-module-a-renseigner');
    });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Conférences — ATPr</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/supabase-init.js"></script>
</head>
<body class="bg-[#f5f2e8] min-h-screen bibliotheque-background">
    <main style="position:relative;z-index:1;" class="pt-32 px-6 pb-20">
          <div class="max-w-5xl mx-auto">

            <button onclick="history.back()" class="inline-flex items-center gap-2 text-[#052e16] hover:text-[#c5a059] transition text-sm">
                <i class="fa-solid fa-arrow-left text-xs"></i>
                <span class="uppercase tracking-wider text-xs">La Bibliothèque</span>
            </button>

            <div class="text-center">
                <p class="text-[#c5a059] uppercase tracking-wider text-xs">Bibliothèque</p>
                <h1 class="font-heritage text-5xl text-[#052e16] italic mt-4">Les Conférences</h1>
            </div>

            <section class="mt-16 grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="/bibliotheque/conferences/sujets.html" class="group border border-[#c5a059]/40 bg-white/50 backdrop-blur-sm rounded-2xl p-8 shadow-lg hover:bg-[#f8f4ea] transition">
                    <p class="text-[#c5a059] uppercase tracking-wider text-xs">Conférences</p>
                    <h2 class="mt-3 text-2xl text-[#052e16] font-semibold italic">Sujets</h2>
                    <p class="mt-4 text-sm text-[#5b4b2a] leading-relaxed">Accédez aux sujets des conférences classés par année et UE.</p>
                </a>
                <a href="/bibliotheque/conferences/corrections.html" class="group border border-[#c5a059]/40 bg-white/50 backdrop-blur-sm rounded-2xl p-8 shadow-lg hover:bg-[#f8f4ea] transition">
                    <p class="text-[#c5a059] uppercase tracking-wider text-xs">Conférences</p>
                    <h2 class="mt-3 text-2xl text-[#052e16] font-semibold italic">Corrections</h2>
                    <p class="mt-4 text-sm text-[#5b4b2a] leading-relaxed">Accédez aux corrections des conférences classées par année et UE.</p>
                </a>
            </section>
        </div>
    </main>

    <script src="/nav.js"></script>
    <script src="/auth.js"></script>
</body>
</html>

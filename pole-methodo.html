<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pôle Méthodo — ATPr</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- SUPABASE + NAVBAR -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-init.js"></script>
</head>

<body class="bg-[#f5f2e8] min-h-screen">

<!-- Pop-up accès restreint — même esthétique que modal-library-error -->
<div id="popup-methodo" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
    <div class="max-w-md mx-4 bg-[#f5f2e8] p-12 auth-frame-gold relative text-center">
        <div class="auth-column auth-column-left"></div>
        <div class="auth-column auth-column-right"></div>

        <div class="mb-6 text-[#c5a059] text-4xl">
            <i class="fas fa-lock"></i>
        </div>

        <h3 class="font-heritage italic text-3xl text-[#052e16] mb-4">Accès Restreint</h3>

        <p class="text-[11px] uppercase tracking-widest leading-loose opacity-70 mb-8 text-black">
            La consultation des ressources du pôle méthodo est exclusivement réservée aux membres de l&apos;ATPr.
        </p>

        <div class="flex flex-col gap-4">
            <button onclick="ouvrirConnexion()" class="auth-submit-btn w-full">S&apos;identifier</button>
            <button onclick="ouvrirInscription()" class="text-[10px] uppercase font-bold tracking-widest text-[#c5a059] hover:underline">Devenir membre</button>
        </div>
    </div>
</div>

<!-- Contenu principal -->
<main id="contenu-methodo" style="display:none; position:relative; z-index:1; min-height:80vh;" class="pt-32 px-6 pb-20">
    <div class="max-w-7xl mx-auto text-center">
        <h1 class="font-heritage text-5xl text-[#052e16] italic">Pôle Méthodo</h1>
        <p class="mt-4 text-[#c5a059] uppercase tracking-widest text-xs">Fiches de méthode &amp; Ressources pédagogiques</p>
    </div>
</main>

<script src="nav.js"></script>
<script src="auth.js"></script>
<script>
function ouvrirPopup() {
    const popup = document.getElementById('popup-methodo');
    popup.style.display = 'flex';
    document.body.classList.add('modal-open');
}

function fermerPopup() {
    const popup = document.getElementById('popup-methodo');
    popup.style.display = 'none';
    document.body.classList.remove('modal-open');
}

function ouvrirConnexion() {
    fermerPopup();
    // Attendre que nav.js ait injecté modal-login
    const tryOpen = () => {
        const m = document.getElementById('modal-login');
        if (m && typeof toggleModal === 'function') {
            toggleModal('modal-login');
        } else {
            setTimeout(tryOpen, 50);
        }
    };
    tryOpen();
}

function ouvrirInscription() {
    fermerPopup();
    const tryOpen = () => {
        const m = document.getElementById('modal-inscription');
        if (m && typeof toggleModal === 'function') {
            toggleModal('modal-inscription');
        } else {
            setTimeout(tryOpen, 50);
        }
    };
    tryOpen();
}

</script>

</body>
</html>
